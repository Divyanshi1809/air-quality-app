<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Quality Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="container text-center mt-5">
<h1>🌍 Air Quality Checker</h1>
<p class="lead">Check the air quality in your city and see the pollutant levels!</p>

<form method="POST" class="mt-4">
<input type="text" name="city" class="form-control" placeholder="Enter city name" required>
<button type="submit" class="btn btn-primary mt-3">Check AQI</button>
</form>

<!-- Add a section to display the AQI result -->
<div id="result" class="mt-4"></div>

<div class="row mt-5">
<div class="col-md-6">
<canvas id="aqiBarChart" width="400" height="200"></canvas>
</div>
<div class="col-md-6">
<canvas id="aqiPieChart" width="400" height="200"></canvas>
</div>
</div>

<div id="details" class="mt-4"></div>

<script>
// Add JavaScript to handle the form submission and display the AQI result
const form = document.querySelector('form');
let barChart = null;
let pieChart = null;

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const city = form.city.value;
    try {
        const response = await fetch(`/get_aqi?city=${encodeURIComponent(city)}`, { method: 'POST' });
        const data = await response.json();
        if (data.error) {
            document.getElementById('result').innerHTML = `<h2 class="text-danger">❌ Error: ${data.error}</h2>`;
            if (barChart) barChart.destroy();
            if (pieChart) pieChart.destroy();
            document.getElementById('details').innerHTML = '';
        } else {
            let mood = '';
            let emoji = '';
            let color = '';
            if (data.aqi == 1) {
                mood = 'Good';
                emoji = '😊';
                color = 'text-success';
            } else if (data.aqi == 2) {
                mood = 'Fair';
                emoji = '😐';
                color = 'text-warning';
            } else if (data.aqi == 3) {
                mood = 'Moderate';
                emoji = '😟';
                color = 'text-warning';
            } else if (data.aqi == 4) {
                mood = 'Poor';
                emoji = '😷';
                color = 'text-danger';
            } else {
                mood = 'Very Poor';
                emoji = '🤢';
                color = 'text-danger';
            }
            document.getElementById('result').innerHTML = `<h2 class="${color}">${emoji} AQI for ${data.city}: ${data.aqi} (${mood})</h2>`;

            // Detailed components
            let details = '<h3>Pollutant Levels (µg/m³):</h3><ul class="list-group">';
            details += `<li class="list-group-item">CO: ${data.components.co || 0}</li>`;
            details += `<li class="list-group-item">NO: ${data.components.no || 0}</li>`;
            details += `<li class="list-group-item">NO2: ${data.components.no2 || 0}</li>`;
            details += `<li class="list-group-item">O3: ${data.components.o3 || 0}</li>`;
            details += `<li class="list-group-item">SO2: ${data.components.so2 || 0}</li>`;
            details += `<li class="list-group-item">PM2.5: ${data.components.pm2_5 || 0}</li>`;
            details += `<li class="list-group-item">PM10: ${data.components.pm10 || 0}</li>`;
            details += `<li class="list-group-item">NH3: ${data.components.nh3 || 0}</li>`;
            details += '</ul>';
            document.getElementById('details').innerHTML = details;

            // Bar Chart
            const barCtx = document.getElementById('aqiBarChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['CO', 'NO', 'NO2', 'O3', 'SO2', 'PM2.5', 'PM10', 'NH3'],
                    datasets: [{
                        label: 'Pollutants (µg/m³)',
                        data: [
                            data.components.co || 0,
                            data.components.no || 0,
                            data.components.no2 || 0,
                            data.components.o3 || 0,
                            data.components.so2 || 0,
                            data.components.pm2_5 || 0,
                            data.components.pm10 || 0,
                            data.components.nh3 || 0
                        ],
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(75, 192, 192, 0.6)',
                            'rgba(153, 102, 255, 0.6)',
                            'rgba(255, 159, 64, 0.6)',
                            'rgba(199, 199, 199, 0.6)',
                            'rgba(83, 102, 255, 0.6)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)',
                            'rgba(255, 159, 64, 1)',
                            'rgba(199, 199, 199, 1)',
                            'rgba(83, 102, 255, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Pollutant Concentrations'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            // Pie Chart - showing relative proportions (normalized)
            const pieCtx = document.getElementById('aqiPieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            const values = [
                data.components.co || 0,
                data.components.no || 0,
                data.components.no2 || 0,
                data.components.o3 || 0,
                data.components.so2 || 0,
                data.components.pm2_5 || 0,
                data.components.pm10 || 0,
                data.components.nh3 || 0
            ];
            const total = values.reduce((a, b) => a + b, 0);
            const percentages = values.map(v => total > 0 ? ((v / total) * 100).toFixed(1) : 0);
            pieChart = new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: ['CO', 'NO', 'NO2', 'O3', 'SO2', 'PM2.5', 'PM10', 'NH3'],
                    datasets: [{
                        data: percentages,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(75, 192, 192, 0.6)',
                            'rgba(153, 102, 255, 0.6)',
                            'rgba(255, 159, 64, 0.6)',
                            'rgba(199, 199, 199, 0.6)',
                            'rgba(83, 102, 255, 0.6)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)',
                            'rgba(255, 159, 64, 1)',
                            'rgba(199, 199, 199, 1)',
                            'rgba(83, 102, 255, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Pollutant Proportions (%)'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.label + ': ' + context.parsed + '%';
                                }
                            }
                        }
                    }
                }
            });
        }
    } catch (error) {
        document.getElementById('result').innerHTML = `<h2 class="text-danger">❌ Error: Unable to fetch data</h2>`;
        if (barChart) barChart.destroy();
        if (pieChart) pieChart.destroy();
        document.getElementById('details').innerHTML = '';
    }
});
</script>
</div>
</body>
</html>
